[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts-upgradeable/lib/openzeppelin-contracts/contracts/"
]

# Compiler
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true

# Testing
gas_reports = ["AgentIdentityRegistry"]

# LUKSO
[rpc_endpoints]
lukso_mainnet = "https://rpc.mainnet.lukso.network"
lukso_testnet = "https://rpc.testnet.lukso.network"

[etherscan]
lukso_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.explorer.execution.mainnet.lukso.network/api" }

# Formatter
[fmt]
line_length = 120
bracket_spacing = true
int_types = "long"
tab_width = 4
